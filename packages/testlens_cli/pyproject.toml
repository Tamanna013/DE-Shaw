[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "testlens-cli"
version = "0.1.0"
description = "TestLens CLI - The AI-powered CI failure analysis platform."
authors = ["TestLens Team <engineering@testlens.io>"]
readme = "README.md"
packages = [{include = "testlens_cli"}]

[tool.poetry.dependencies]
python = "^3.9"
typer = {extras = ["all"], version = "^0.9.0"}
httpx = "^0.25.1"
rich = "^13.7.0"
keyring = "^24.3.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.3"
respx = "^0.20.2"

[tool.poetry.scripts]
testlens = "testlens_cli.main:cli"
